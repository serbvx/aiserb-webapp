<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<title>AISerb</title>

<!-- Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>

<!-- Sanitize -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

<!-- Highlight -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']]
  },
  svg: {
    fontCache: 'global'
  }
};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --gold: #C9A84C;
  --gold-light: #F2D27A;
  --gold-dim: #8B6914;

  --bg: #090704;
  --bg2: #110C05;
  --bg3: #1A1207;

  --surface: #151008;
  --surface2: #211807;

  --border: rgba(201,168,76,0.12);
  --border2: rgba(201,168,76,0.22);

  --text: #EEE0BC;
  --text-dim: #9A8660;
  --text-faint: #54472C;

  --red: #d65d5d;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.04;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(201,168,76,0.3), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(201,168,76,0.2), transparent 40%);
}

.app {
  position: relative;
  z-index: 1;

  max-width: 900px;
  margin: 0 auto;

  height: 100vh;

  display: flex;
  flex-direction: column;
}

.header {
  flex-shrink: 0;

  display: flex;
  align-items: center;
  gap: 14px;

  padding: 16px;

  border-bottom: 1px solid var(--border);

  background:
    linear-gradient(
      180deg,
      rgba(201,168,76,0.08),
      transparent
    );
}

.header-icon {
  width: 40px;
  height: 40px;

  border-radius: 10px;

  display: flex;
  align-items: center;
  justify-content: center;

  background:
    linear-gradient(
      135deg,
      var(--gold-dim),
      var(--gold)
    );

  font-size: 18px;

  box-shadow:
    0 0 18px rgba(201,168,76,0.3);
}

.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  color: var(--gold-light);
}

.header-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.clear-btn {
  margin-left: auto;

  border: 1px solid var(--border);
  background: transparent;

  color: var(--text-dim);

  border-radius: 8px;

  padding: 7px 14px;

  cursor: pointer;

  transition: 0.2s;
}

.clear-btn:hover {
  border-color: var(--gold);
  color: var(--gold-light);
}

.messages {
  flex: 1;
  overflow-y: auto;

  padding: 20px;

  display: flex;
  flex-direction: column;
  gap: 18px;
}

.messages::-webkit-scrollbar {
  width: 4px;
}

.messages::-webkit-scrollbar-thumb {
  background: var(--gold-dim);
}

.msg {
  display: flex;
  gap: 12px;

  animation: fade 0.25s ease;
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg.user {
  flex-direction: row-reverse;
}

.avatar {
  width: 34px;
  height: 34px;

  border-radius: 8px;

  display: flex;
  align-items: center;
  justify-content: center;

  flex-shrink: 0;
}

.msg.bot .avatar {
  background:
    linear-gradient(
      135deg,
      var(--gold-dim),
      var(--gold)
    );
}

.msg.user .avatar {
  background: var(--surface2);
  border: 1px solid var(--border);
}

.msg-body {
  max-width: 82%;
}

.msg.user .msg-body {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.bubble {
  padding: 14px 16px;

  border-radius: 14px;

  line-height: 1.8;

  overflow-wrap: break-word;

  overflow-x: auto;
}

.msg.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);

  border-top-left-radius: 4px;
}

.msg.user .bubble {
  background:
    linear-gradient(
      135deg,
      #2b1e08,
      #1b1408
    );

  border: 1px solid var(--border2);

  border-top-right-radius: 4px;

  color: var(--gold-light);
}

.time {
  margin-top: 4px;
  font-size: 10px;
  color: var(--text-faint);
}

.message-content p {
  margin: 12px 0;
}

.message-content h1,
.message-content h2,
.message-content h3 {
  color: var(--gold-light);

  margin:
    22px 0 12px;

  font-family:
    'Cormorant Garamond',
    serif;
}

.message-content ul,
.message-content ol {
  margin: 10px 0;
  padding-left: 22px;
}

.message-content li {
  margin: 6px 0;
}

.message-content pre {
  background: #0d0d0d;

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 12px;

  padding: 16px;

  overflow-x: auto;

  margin: 14px 0;
}

.message-content code {
  font-family:
    'JetBrains Mono',
    monospace;
}

.message-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
}

.message-content td,
.message-content th {
  border: 1px solid rgba(255,255,255,0.08);
  padding: 8px;
}

.message-content blockquote {
  border-left: 3px solid var(--gold);
  padding-left: 12px;
  margin: 12px 0;
  opacity: 0.9;
}

mjx-container {
  overflow-x: auto;
  overflow-y: hidden;

  max-width: 100%;

  padding: 8px 0;
}

.input-area {
  flex-shrink: 0;

  border-top: 1px solid var(--border);

  background: var(--bg2);

  padding: 14px;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

textarea {
  flex: 1;

  resize: none;

  background: var(--surface);

  border: 1px solid var(--border);

  color: var(--text);

  border-radius: 12px;

  padding: 12px;

  min-height: 48px;
  max-height: 160px;

  outline: none;

  font-family: inherit;

  line-height: 1.6;
}

textarea:focus {
  border-color: var(--gold-dim);
}

.btns {
  display: flex;
  gap: 8px;
}

.btn {
  width: 46px;
  height: 46px;

  border-radius: 12px;

  border: none;

  cursor: pointer;

  transition: 0.2s;
}

.photo-btn {
  background: var(--surface2);
  border: 1px solid var(--border);

  color: var(--text);
}

.send-btn {
  background:
    linear-gradient(
      135deg,
      var(--gold-dim),
      var(--gold)
    );

  color: black;

  font-weight: bold;

  box-shadow:
    0 0 18px rgba(201,168,76,0.3);
}

.send-btn:hover {
  transform: translateY(-1px);
}

.typing {
  display: flex;
  gap: 4px;
  padding: 10px;
}

.typing span {
  width: 5px;
  height: 5px;

  border-radius: 50%;

  background: var(--gold);

  animation: blink 1s infinite;
}

.typing span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes blink {
  0%,100% {
    opacity: 0.3;
    transform: translateY(0);
  }

  50% {
    opacity: 1;
    transform: translateY(-4px);
  }
}

.welcome {
  flex: 1;

  display: flex;
  flex-direction: column;

  align-items: center;
  justify-content: center;

  text-align: center;

  gap: 16px;

  color: var(--text-dim);
}

.welcome h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  color: var(--gold-light);
}

.welcome p {
  max-width: 500px;
  line-height: 1.8;
}

#file {
  display: none;
}

.preview {
  margin-top: 10px;

  max-width: 120px;

  border-radius: 10px;

  border: 1px solid var(--border);
}

</style>
</head>

<body>

<div class="app">

  <div class="header">

    <div class="header-icon">
      🤖
    </div>

    <div>
      <div class="header-title">
        AISerb
      </div>

      <div class="header-sub">
        AI · LATEX · VISION
      </div>
    </div>

    <button class="clear-btn" onclick="clearChat()">
      очистить
    </button>

  </div>

  <div class="messages" id="messages">

    <div class="welcome" id="welcome">

      <h1>
        AISerb
      </h1>

      <p>
        Умный AI-ассистент с красивым отображением формул, кода и ответов.
      </p>

    </div>

  </div>

  <div class="input-area">

    <div class="input-row">

      <textarea
        id="input"
        placeholder="Напиши сообщение..."
        rows="1"
      ></textarea>

      <div class="btns">

        <button class="btn photo-btn"
          onclick="document.getElementById('file').click()">
          📷
        </button>

        <button class="btn send-btn"
          onclick="sendMessage()">
          ➤
        </button>

      </div>

    </div>

    <input
      type="file"
      id="file"
      accept="image/*"
    >

    <div id="preview"></div>

  </div>

</div>

<script>

const API_URL = "http://localhost:8000/chat";

const md = window.markdownit({
  html: false,
  breaks: true,
  linkify: true,
  typographer: true,

  highlight(str, lang) {

    try {

      if (lang && hljs.getLanguage(lang)) {

        return `<pre><code class="hljs">${
          hljs.highlight(str, {
            language: lang
          }).value
        }</code></pre>`;
      }

    } catch {}

    return `<pre><code class="hljs">${
      md.utils.escapeHtml(str)
    }</code></pre>`;
  }
});

let history = [];
let imageBase64 = null;

const input = document.getElementById('input');

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height =
    Math.min(input.scrollHeight, 160) + 'px';
});

input.addEventListener('keydown', e => {

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }

});

document.getElementById('file')
.addEventListener('change', handleImage);

function preprocessMath(text) {

  text = text.replace(/\\s/g, '');

  text = text.replace(
    /\\frac(\d)(\d)/g,
    '\\frac{$1}{$2}'
  );

  text = text.replace(/\$\$\$/g, '$$');

  text = text.replace(/\$\s*\$/g, '');

  text = text.replace(/\n{3,}/g, '\n\n');

  return text;
}

function renderMarkdown(text) {

  text = preprocessMath(text);

  let html = md.render(text);

  html = DOMPurify.sanitize(html);

  return html;
}

function time() {

  return new Date()
  .toLocaleTimeString('ru', {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function scrollBottom() {

  const msgs = document.getElementById('messages');

  msgs.scrollTop = msgs.scrollHeight;
}

function hideWelcome() {

  document.getElementById('welcome')?.remove();
}

function addMessage(role, html, image) {

  hideWelcome();

  const msgs = document.getElementById('messages');

  const div = document.createElement('div');

  div.className = `msg ${role}`;

  div.innerHTML = `
    <div class="avatar">
      ${role === 'bot' ? '🤖' : '👤'}
    </div>

    <div class="msg-body">

      ${image ? `
        <img class="preview" src="${image}">
      ` : ''}

      <div class="bubble message-content">
        ${html}
      </div>

      <div class="time">
        ${time()}
      </div>

    </div>
  `;

  msgs.appendChild(div);

  scrollBottom();

  if (window.MathJax) {

    MathJax.typesetClear?.([div]);

    MathJax.typesetPromise([div])
    .catch(console.error);
  }

  return div;
}

function addTyping() {

  const msgs = document.getElementById('messages');

  const div = document.createElement('div');

  div.className = 'msg bot';

  div.id = 'typing';

  div.innerHTML = `
    <div class="avatar">🤖</div>

    <div class="msg-body">
      <div class="bubble">

        <div class="typing">
          <span></span>
          <span></span>
          <span></span>
        </div>

      </div>
    </div>
  `;

  msgs.appendChild(div);

  scrollBottom();
}

function removeTyping() {

  document.getElementById('typing')?.remove();
}

async function sendMessage() {

  const text = input.value.trim();

  if (!text && !imageBase64)
    return;

  addMessage(
    'user',
    renderMarkdown(text || 'Фото'),
    imageBase64
  );

  const payload = {
    message: text,
    image: imageBase64,
    history
  };

  history.push({
    role: 'user',
    content: text
  });

  input.value = '';

  imageBase64 = null;

  document.getElementById('preview').innerHTML = '';

  addTyping();

  try {

    const response = await fetch(API_URL, {

      method: 'POST',

      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify(payload)
    });

    const data = await response.json();

    removeTyping();

    const answer =
      preprocessMath(data.response);

    history.push({
      role: 'assistant',
      content: answer
    });

    addMessage(
      'bot',
      renderMarkdown(answer)
    );

  } catch (e) {

    removeTyping();

    addMessage(
      'bot',
      `<span style="color:red">
        Ошибка: ${e.message}
      </span>`
    );
  }
}

function handleImage(e) {

  const file = e.target.files[0];

  if (!file)
    return;

  const reader = new FileReader();

  reader.onload = ev => {

    imageBase64 = ev.target.result;

    document.getElementById('preview')
    .innerHTML = `
      <img class="preview"
      src="${imageBase64}">
    `;
  };

  reader.readAsDataURL(file);
}

function clearChat() {

  history = [];

  document.getElementById('messages')
  .innerHTML = `
    <div class="welcome" id="welcome">

      <h1>AISerb</h1>

      <p>
        Умный AI-ассистент с красивым отображением формул, кода и ответов.
      </p>

    </div>
  `;
}

</script>

</body>
</html>
