<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AISerb</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-svg.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  --gold:        #C9A84C;
  --gold-light:  #E8C97A;
  --gold-dim:    #8B6914;
  --bg:          #0A0804;
  --bg2:         #0F0C06;
  --bg3:         #161008;
  --surface:     #1A1408;
  --surface2:    #221A0A;
  --border:      rgba(201,168,76,0.15);
  --border2:     rgba(201,168,76,0.3);
  --text:        #F0E6C8;
  --text-dim:    #8A7A5A;
  --text-faint:  #4A3F28;
  --red:         #C95A4C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  overflow: hidden;
}

/* ── Noise overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── Gold glow bg ── */
body::after {
  content: '';
  position: fixed;
  top: -40%; left: 50%; transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.app {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex; flex-direction: column;
  max-width: 800px; margin: 0 auto;
}

/* ── Header ── */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(201,168,76,0.05) 0%, transparent 100%);
  flex-shrink: 0;
}

.header-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 16px rgba(201,168,76,0.3);
  flex-shrink: 0;
}

.header-text { flex: 1; }
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 0.5px;
  line-height: 1;
}
.header-sub {
  font-size: 10px; color: var(--text-dim);
  margin-top: 2px; letter-spacing: 1px;
  text-transform: uppercase;
}

.clear-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); padding: 5px 10px;
  border-radius: 6px; cursor: pointer; font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.2s;
}
.clear-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── Messages ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ── Message bubble ── */
.msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 2px;
}
.msg.bot .msg-avatar {
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  box-shadow: 0 0 10px rgba(201,168,76,0.2);
}
.msg.user .msg-avatar {
  background: var(--surface2);
  border: 1px solid var(--border);
}

.msg-body { max-width: 82%; display: flex; flex-direction: column; gap: 4px; }
.msg.user .msg-body { align-items: flex-end; }

.msg-bubble {
  padding: 10px 13px;
  border-radius: 12px;
  line-height: 1.65;
  font-size: 13px;
  word-break: break-word;
}

.msg.bot .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top-left-radius: 3px;
  color: var(--text);
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, #2A1F08, #1E1608);
  border: 1px solid var(--border2);
  border-top-right-radius: 3px;
  color: var(--gold-light);
}

.msg-time {
  font-size: 10px; color: var(--text-faint);
  padding: 0 4px;
}

/* ── Image in message ── */
.msg-img {
  max-width: 200px; border-radius: 8px;
  border: 1px solid var(--border);
  margin-bottom: 6px;
}

/* ── Typing indicator ── */
.typing-dots {
  display: flex; gap: 4px; align-items: center;
  padding: 12px 14px;
}
.typing-dots span {
  width: 5px; height: 5px;
  background: var(--gold-dim); border-radius: 50%;
  animation: dot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ── Input area ── */
.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.input-row {
  display: flex; gap: 8px; align-items: flex-end;
}

.input-box {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 40px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.input-box::placeholder { color: var(--text-faint); }
.input-box:focus { border-color: var(--gold-dim); }

.btn-group { display: flex; gap: 6px; }

.btn {
  width: 40px; height: 40px;
  border-radius: 10px; border: none;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  flex-shrink: 0;
}

.btn-photo {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.btn-photo:hover { border-color: var(--gold-dim); color: var(--gold); }
.btn-photo:active { transform: scale(0.95); }

.btn-send {
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg);
  box-shadow: 0 0 12px rgba(201,168,76,0.3);
}
.btn-send:hover { box-shadow: 0 0 20px rgba(201,168,76,0.5); }
.btn-send:active { transform: scale(0.95); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

#file-input { display: none; }

/* ── LaTeX rendered ── */
.msg-bubble .MJX-TEX { color: var(--gold-light) !important; }

/* ── Code blocks ── */
.msg-bubble pre {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  overflow-x: auto;
  margin: 6px 0;
  font-size: 12px;
}
.msg-bubble code {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 12px;
  color: var(--gold-light);
}
.msg-bubble pre code {
  background: none; border: none; padding: 0;
}

/* ── Welcome ── */
.welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
  color: var(--text-dim);
}
.welcome-icon {
  font-size: 48px;
  filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.3)); }
  50% { filter: drop-shadow(0 0 30px rgba(201,168,76,0.6)); }
}
.welcome h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 300;
  color: var(--gold-light); letter-spacing: 1px;
}
.welcome p { font-size: 12px; line-height: 1.7; max-width: 260px; }
.welcome-chips {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-top: 8px;
}
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.chip:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── Bold/italic in messages ── */
.msg-bubble strong { color: var(--gold-light); font-weight: 600; }
.msg-bubble em { color: var(--text); font-style: italic; }
.msg-bubble p { margin: 4px 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 4px 0; }
.msg-bubble li { margin: 2px 0; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <div class="header-title">AISerb</div>
      <div class="header-sub">Llama 3.3 · Vision · LaTeX</div>
    </div>
    <button class="clear-btn" onclick="clearChat()">очистить</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Чем могу помочь?</h2>
      <p>Задай любой вопрос, отправь фото задачи — я решу и объясню с красивым LaTeX форматированием</p>
      <div class="welcome-chips">
        <div class="chip" onclick="useChip(this)">Реши уравнение</div>
        <div class="chip" onclick="useChip(this)">Объясни тему</div>
        <div class="chip" onclick="useChip(this)">Напиши код</div>
        <div class="chip" onclick="useChip(this)">Переведи текст</div>
        <div class="chip" onclick="useChip(this)">Проверь работу</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="input"
        placeholder="Напиши вопрос или отправь фото..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <div class="btn-group">
        <button class="btn btn-photo" onclick="document.getElementById('file-input').click()" title="Фото">📷</button>
        <button class="btn btn-send" id="send-btn" onclick="sendMessage()" title="Отправить">➤</button>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
  </div>

</div>

<script>
const API_KEY   = "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";
const MODEL     = "llama-3.3-70b-versatile";
const VIS_MODEL = "meta-llama/llama-4-scout-17b-16e-instruct";

const SYSTEM = `Ты AISerb — умный ИИ-ассистент. Отвечай на языке пользователя.
Используй красивое LaTeX форматирование для математики:
- Inline: $формула$
- Block: $$формула$$
- Дроби: \\frac{a}{b}
- Корни: \\sqrt{x}
- Степени: x^{2}
Структурируй ответы. Используй **жирный** и *курсив* для важного.`;

let history = [];
let pendingImage = null;
let isLoading = false;

// Telegram WebApp init
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useChip(el) {
  document.getElementById('input').value = el.textContent;
  sendMessage();
}

function getTime() {
  return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(role, content, imgSrc) {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'bot' ? '🤖' : '👤';
  const html = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      ${imgSrc ? `<img class="msg-img" src="${imgSrc}">` : ''}
      <div class="msg-bubble">${content}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;

  // Render MathJax
  if (window.MathJax) {
    MathJax.typesetPromise([div]).catch(() => {});
  }
  return div;
}

function addTyping() {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function formatResponse(text) {
  // Bold **text**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Newlines
  text = text.replace(/\n/g, '<br>');
  return text;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text && !pendingImage) return;

  const img = pendingImage;
  pendingImage = null;

  const displayText = text || 'Реши задачу на фото';
  addMessage('user', formatResponse(displayText), img?.preview);

  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    let messages;
    if (img) {
      // Vision request
      messages = [{
        role: 'user',
        content: [
          { type: 'text', text: SYSTEM + '\n\n' + displayText },
          { type: 'image_url', image_url: { url: img.base64 } }
        ]
      }];
    } else {
      history.push({ role: 'user', content: text });
      messages = [{ role: 'system', content: SYSTEM }, ...history];
    }

    const model = img ? VIS_MODEL : MODEL;
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({ model, messages, max_tokens: 2000 })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'API error');

    const answer = data.choices[0].message.content;
    if (!img) history.push({ role: 'assistant', content: answer });

    removeTyping();
    addMessage('bot', formatResponse(answer));

  } catch (e) {
    removeTyping();
    addMessage('bot', `<span style="color:var(--red)">⚠️ Ошибка: ${e.message}</span>`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImage = {
      base64: ev.target.result,
      preview: ev.target.result
    };
    // Show preview in input
    const input = document.getElementById('input');
    input.placeholder = '📷 Фото прикреплено. Добавь вопрос или отправь так...';
    input.focus();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function clearChat() {
  history = [];
  pendingImage = null;
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Чем могу помочь?</h2>
      <p>Задай любой вопрос, отправь фото задачи — я решу и объясню с красивым LaTeX форматированием</p>
      <div class="welcome-chips">
        <div class="chip" onclick="useChip(this)">Реши уравнение</div>
        <div class="chip" onclick="useChip(this)">Объясни тему</div>
        <div class="chip" onclick="useChip(this)">Напиши код</div>
        <div class="chip" onclick="useChip(this)">Переведи текст</div>
        <div class="chip" onclick="useChip(this)">Проверь работу</div>
      </div>
    </div>`;
  document.getElementById('input').placeholder = 'Напиши вопрос или отправь фото...';
}
</script>
</body>
</html>
