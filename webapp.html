<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISerb</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0806;
            color: #f5f0e6;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #120e08;
            border-bottom: 1px solid #d4af37;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .bubble {
            background: #1e1810;
            border: 1px solid #d4af37;
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 80%;
        }
        .user .bubble {
            background: #2a1f0a;
        }
        .input-area {
            background: #120e08;
            border-top: 1px solid #d4af37;
            padding: 12px;
            display: flex;
            gap: 8px;
        }
        textarea {
            flex: 1;
            background: #1a150e;
            border: 1px solid #d4af37;
            border-radius: 20px;
            padding: 10px;
            color: white;
            font-family: inherit;
            resize: none;
            outline: none;
        }
        button {
            background: #d4af37;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 10px;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: #d4af37;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>✨ AISerb</div>
    <button onclick="clearChat()">Очистить</button>
</div>

<div class="messages" id="messages">
    <div style="text-align:center; margin-top:40px;">
        ✨ <strong>AISerb</strong><br>
        Напиши сообщение
    </div>
</div>

<div class="input-area">
    <textarea id="input" placeholder="Напиши вопрос..." rows="1"></textarea>
    <button onclick="sendMessage()">➤</button>
</div>

<script>
const API_URL = "https://unshaven-petri-spotless.ngrok-free.dev/chat";

let history = [];

function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing';
    div.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    
    addMessage('user', text);
    input.value = '';
    addTyping();
    
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: history })
        });
        const data = await res.json();
        removeTyping();
        const reply = data.response || "Нет ответа";
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: reply });
        addMessage('bot', reply);
    } catch (e) {
        removeTyping();
        addMessage('bot', '⚠️ Ошибка: ' + e.message);
    }
}

function clearChat() {
    history = [];
    document.getElementById('messages').innerHTML = '<div style="text-align:center; margin-top:40px;">✨ <strong>AISerb</strong><br>Напиши сообщение</div>';
}

document.getElementById('input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});
</script>
</body>
</html>
